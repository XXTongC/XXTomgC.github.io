# Setup
title: XXTongC's Blog
description: A Gamer To be a Gamer
url: https://XXTongC.github.io
avatar: /avatar.jpeg
paginate: 5
permalink: pretty
cover_image: /bg.jpeg

collections:
  algorithm:
    output: true
    permalink: /algorithm/:path/

defaults:
  - scope:
      path: ""
      type: "algorithm"
    values:
      layout: "post"

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  math_engine: null  
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: XXTongC
  card: summary
logo: logo.png
social:
  name: XXTongC
  links:
    - https://bilibili.com/CODRICE
    - https://github.com/XXTongC
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: XXTong
  url: https://github.com/XXTongC/
  email: 2449208757@qq.com

liquid:
  error_mode: lax